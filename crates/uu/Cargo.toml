[package]
name = "uu"
version = "0.1.0"
edition = "2021"
description = "Universal utilities — zero-config developer tools that detect your project and do the right thing"
license = "MIT"

[[bin]]
name = "uu"
path = "src/main.rs"

[dependencies]
uu-detect = { path = "../detect" }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
